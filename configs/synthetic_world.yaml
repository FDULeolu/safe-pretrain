world:
  name: synthetic_world_${world.num_effects}effects_${world.num_causes}causes_${partition.restricted_fraction}restricted_${world.recipe_arity}arity_wo_overlap
  seed: 42
  output_dir: data/worlds/${world.name}
  overwrite: false
  num_effects: 4096
  num_causes: 8192
  recipe_arity: 3

surface:
  cause_vocab_source: neutral_words
  effect_vocab_source: generated_phrases
  use_families: false
  family_definition: none
  num_families: null
  forbid_harmful_real_terms: true
  enforce_vocab_disjoint: true

relations:
  unique_recipe_per_effect: true
  unique_cause_tuple: true
  allow_duplicate_cause_in_recipe: false
  cause_frequency_balance: true

partition:
  split_strategy: random
  restricted_fraction: 0.5

audit:
  assert_stage1_world_valid: true
  assert_vocab_disjoint: true
  assert_unique_cause_tuple: true
  write_audit_json: true
