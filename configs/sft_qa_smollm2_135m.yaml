project:
  experiment_name: smollm2-135m-sft-reverse-qa-v1
  seed: 42

runtime:
  visible_devices: "0,1,2,3"
  mixed_precision: auto

model:
  base_checkpoint: outputs/smollm2-135m-scratch-0p3b-1epoch-bs512/checkpoints/step-0001209/hf_model

data:
  dataset_root: data/worlds/synthetic_world_4096effects_8192causes_0.5restricted_3arity_wo_overlap/sft/qa_1ex_0.8train_composition_v1
  train_file: ${data.dataset_root}/sft_train.jsonl
  validation_file: ${data.dataset_root}/sft_validation.jsonl
  chat_template_path: ${data.dataset_root}/chat_template.jinja
  max_length: 256
  packing: false
  completion_only_loss: false
  assistant_only_loss: true

train:
  num_train_epochs: 3
  per_device_train_batch_size: 32
  gradient_accumulation_steps: 1
  learning_rate: 2.0e-5
  logging_steps: 10
  eval_steps: 100
  save_steps: 500

accuracy_eval:
  enabled: true
  train_examples: 512
  val_examples: 2048
  batch_size: 64
  max_new_tokens: 32

wandb:
  enabled: true
