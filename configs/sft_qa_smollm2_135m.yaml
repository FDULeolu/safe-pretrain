project:
  experiment_name: smollm2-135m-sft-reverse-qa-v1
  seed: 42

runtime:
  visible_devices: "0,1,2,3"
  # Set a unique port when running multiple Accelerate jobs on one host.
  main_process_port: null
  mixed_precision: auto

model:
  base_checkpoint: outputs/pt-ocr_w1024-c2048-a1-r10-dic-strict_plain_fi6-lr3.0e-4-wd1.0/checkpoints/latest/hf_model

data:
  dataset_root: data/experiments/ocr_w1024-c2048-a1-r10-dic-strict_plain_fi6/sft_plain
  train_file: ${data.dataset_root}/sft_train.jsonl
  validation_file: null
  attack_file: ${data.dataset_root}/eval_attack.jsonl
  chat_template_path: ${data.dataset_root}/chat_template.jinja
  max_length: 256
  packing: false
  completion_only_loss: false
  assistant_only_loss: true

train:
  num_train_epochs: 3
  per_device_train_batch_size: 32
  gradient_accumulation_steps: 1
  learning_rate: 2.0e-5
  logging_steps: 10
  eval_steps: 100
  save_steps: 500
  save_total_limit: null

wandb:
  enabled: true
