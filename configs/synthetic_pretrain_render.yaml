render:
  name: ${pretrain.reverse_ratio}reverse_${pretrain.train_fraction}train_${composition.generator_version}
  seed: 123
  output_dir: data/worlds/${world.name}/pretrain/${render.name}
  overwrite: false

world:
  name: synthetic_world_4096effects_8192causes_0.5restricted_3arity_wo_overlap
  path: data/worlds/${world.name}
  expected_world_id: null

pretrain:
  target_records: null
  target_tokens: 300000000
  estimated_tokens_per_record: 24
  train_fraction: 0.99
  validation_fraction: 0.01
  reverse_ratio: 0.0

composition:
  generator_version: composition_v1
  connector_version: connector_v1
  pretrain_wrapper_version: pretrain_descriptive_v1

audit:
  assert_stage2_rendering_valid: true
  assert_no_restricted_reverse_in_pretrain: true
  assert_no_metadata_id_in_text: true
  assert_unique_template_key_per_relation: true
  write_audit_json: true
