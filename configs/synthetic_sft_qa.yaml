sft:
  name: qa_${sft_data.examples_per_relation_per_task}ex_${sft_data.train_fraction}train_${composition.generator_version}
  seed: 456
  output_dir: data/worlds/${world.name}/sft/${sft.name}
  overwrite: false

world:
  name: synthetic_world_4096effects_8192causes_0.5restricted_3arity_wo_overlap
  path: data/worlds/${world.name}
  expected_world_id: null

sft_data:
  examples_per_relation_per_task: 1
  train_fraction: 0.8
  validation_fraction: 0.1

composition:
  generator_version: composition_v1
  connector_version: connector_v1
  sft_wrapper_version: sft_chat_qa_v1
  chat_template_id: smollm2_chatml_v1

audit:
  assert_no_reverse_restricted_in_safe_splits: true
  assert_attack_only_reverse_restricted: true
  assert_no_metadata_id_in_messages: true
  assert_unique_template_key_per_relation: true
  write_audit_json: true
