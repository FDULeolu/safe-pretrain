      - accelerate>=0.33
      - datasets>=2.20
      - numpy
      - omegaconf
      - pandas
      - pyarrow
      - rich
      - safetensors
      - sentencepiece
      - tokenizers
      - tqdm
      - transformers>=4.42
      - wandb
      - pytest
